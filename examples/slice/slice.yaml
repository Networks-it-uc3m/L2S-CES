apiVersion: l2sces.l2sm.io/v1
kind: SliceOverlay
metadata:
  name: example-slice
  namespace: l2sm-system
spec:
  provider:
    name: idco-controller
    domain:
      - 172.18.0.2
    ofPort: "30663"
    sdnPort: "30808"
  switchTemplate:
    spec:
      hostNetwork: true
      containers:
        - name: l2sm-switch
          image: alexdecb/talpa:1.3.8
          imagePullPolicy: Always
          resources: {}
          args:
            - "ned"
          securityContext:
            capabilities:
              add:
                - "NET_ADMIN"
  topology:
    nodes:
      - name: cluster1
      - name: cluster2
    links:
      - endpointA: cluster1
        endpointB: cluster2
